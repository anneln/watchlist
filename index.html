<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Movie Watchlist</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" href="images/iconWList.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <header>
      <div class="header-section">
        <h1>Find your film</h1>
        <a href="watchlist.html">My Watchlist</a>
      </div>
      <form
        class="search-form"
        role="search"
        aria-label="search a film"
      >
        <div class="search-wrapper">
          <input
            type="search"
            id="film-title"
            aria-label="film title"
            placeholder=" Write a title"
            autocomplete="off"
          />
          <button type="submit"
            id="search-btn"
            aria-label="search a title">
            Search
          </button>
        </div>
      </form>
    </header>
    <main class="main-container">
      <div id="empty-state">
        <img
        id="black-icon"
        src="images/IconBlack.svg"
        alt=""
        aria-hidden="true"
      />
        <p>Start exploring</p>
      </div> 
      <div id="film-list" role="list" aria-live="polite"></div>
    </main>
    <footer>&copy;<a href=https://ahbricet.com target="_blank"> ahbricet.com</a></footer>
    <script src="index.js" defer></script>
  </body>
</html>
